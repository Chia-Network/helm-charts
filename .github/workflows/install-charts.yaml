name: Test Install Charts

on: pull_request

jobs:
  install-charts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create k8s Kind Cluster
        uses: helm/kind-action@v1

      - name: Install Helm
        uses: azure/setup-helm@v3

      - name: Install generic chart (deployment mode)
        uses: Chia-Network/actions/helm/deploy@main
        with:
          namespace: "generic"
          app_name: "generic-test"
          helm_chart: "./charts/generic"
          helm_values: "./charts/generic/values.yaml"

      - name: Verify generic chart created Deployment
        run: |
          kubectl get deployment generic-test -n generic
          if [ $? -eq 0 ]; then
            echo "✓ Deployment 'generic-test' exists in namespace 'generic'"
          else
            echo "✗ Deployment 'generic-test' not found"
            exit 1
          fi
          # Verify StatefulSet does NOT exist
          if kubectl get statefulset generic-test -n generic 2>/dev/null; then
            echo "✗ Unexpected StatefulSet found (should be Deployment)"
            exit 1
          else
            echo "✓ No StatefulSet found (correct)"
          fi

      - name: Test generic chart (stateful mode)
        uses: Chia-Network/actions/helm/deploy@main
        with:
          namespace: "generic-stateful-mode"
          app_name: "generic-stateful-mode-test"
          helm_chart: "./charts/generic"
          helm_values: "./charts/generic/test-values-stateful.yaml"

      - name: Verify generic chart (stateful mode) created StatefulSet
        run: |
          kubectl get statefulset generic-stateful-mode-test -n generic-stateful-mode
          if [ $? -eq 0 ]; then
            echo "✓ StatefulSet 'generic-stateful-mode-test' exists in namespace 'generic-stateful-mode'"
          else
            echo "✗ StatefulSet 'generic-stateful-mode-test' not found"
            exit 1
          fi
          # Verify Deployment does NOT exist
          if kubectl get deployment generic-stateful-mode-test -n generic-stateful-mode 2>/dev/null; then
            echo "✗ Unexpected Deployment found (should be StatefulSet)"
            exit 1
          else
            echo "✓ No Deployment found (correct)"
          fi

      - name: Test volume restrictions - Deployment with RWO and replicas > 1 (should fail)
        run: |
          set +e
          helm template test ./charts/generic -f ./charts/generic/test-values-deployment-rwo-fail.yaml 2>&1 | tee /tmp/helm-output.txt
          EXIT_CODE=${PIPESTATUS[0]}
          set -e
          if [ $EXIT_CODE -eq 0 ]; then
            echo "✗ Expected validation failure for RWO volume with replicas > 1, but helm template succeeded"
            exit 1
          fi
          if grep -q "cannot be used with deployments when replicaCount > 1" /tmp/helm-output.txt; then
            echo "✓ Validation correctly failed for RWO volume with replicas > 1"
          else
            echo "✗ Validation failed but with unexpected error message"
            cat /tmp/helm-output.txt
            exit 1
          fi

      - name: Test volume restrictions - Deployment with RWX and replicas > 1 (should succeed)
        run: |
          helm template test ./charts/generic -f ./charts/generic/test-values-deployment-rwx-success.yaml > /dev/null
          if [ $? -eq 0 ]; then
            echo "✓ Validation passed for RWX volume with replicas > 1"
          else
            echo "✗ Unexpected failure for RWX volume with replicas > 1"
            exit 1
          fi

      - name: Test volume restrictions - StatefulSet with RWO and replicas > 1 (should succeed)
        run: |
          helm template test ./charts/generic -f ./charts/generic/test-values-stateful.yaml > /dev/null
          if [ $? -eq 0 ]; then
            echo "✓ Validation passed for StatefulSet with RWO volume and replicas > 1"
          else
            echo "✗ Unexpected failure for StatefulSet with RWO volume and replicas > 1"
            exit 1
          fi

      - name: Test PersistentVolumes - verify no PV created by default
        run: |
          helm template test ./charts/generic -f ./charts/generic/test-values-pv-default.yaml > /tmp/pv-default-output.yaml
          if grep -q "kind: PersistentVolume" /tmp/pv-default-output.yaml; then
            echo "✗ Unexpected PersistentVolume found in default values output"
            exit 1
          else
            echo "✓ No PersistentVolume created by default (correct)"
          fi

      - name: Test PersistentVolumes - verify PVs can be created
        run: |
          helm template test ./charts/generic -f ./charts/generic/test-values-pv-created.yaml > /tmp/pv-created-output.yaml
          PV_COUNT=$(grep -c "kind: PersistentVolume" /tmp/pv-created-output.yaml || echo "0")
          if [ "$PV_COUNT" -eq 2 ]; then
            echo "✓ Correctly created 2 PersistentVolumes"
          else
            echo "✗ Expected 2 PersistentVolumes, found $PV_COUNT"
            exit 1
          fi
          # Verify PV names
          if grep -q "name: test-pv-1" /tmp/pv-created-output.yaml && grep -q "name: test-pv-2" /tmp/pv-created-output.yaml; then
            echo "✓ Both PVs have correct names"
          else
            echo "✗ PV names not found as expected"
            exit 1
          fi
          # Verify PV specs
          if grep -q "storage: 10Gi" /tmp/pv-created-output.yaml && grep -q "storage: 5Gi" /tmp/pv-created-output.yaml; then
            echo "✓ PVs have correct storage sizes"
          else
            echo "✗ PV storage sizes not found as expected"
            exit 1
          fi

      - name: Test job mode - verify template structure
        run: |
          helm template test ./charts/generic -f ./charts/generic/test-values-job.yaml > /tmp/job-output.yaml
          # Must produce a Job, not a Deployment or StatefulSet
          if grep -q "kind: Job" /tmp/job-output.yaml; then
            echo "✓ Job resource found"
          else
            echo "✗ Job resource not found"
            exit 1
          fi
          if kubectl get deployment generic-job-mode-test -n generic-job-mode 2>/dev/null || grep -q "kind: Deployment" /tmp/job-output.yaml; then
            echo "✗ Unexpected Deployment found in job mode output"
            exit 1
          else
            echo "✓ No Deployment in job mode output (correct)"
          fi
          # Must have Helm hook annotations for re-run-on-upgrade behavior
          if grep -q "helm.sh/hook" /tmp/job-output.yaml; then
            echo "✓ Helm hook annotations present"
          else
            echo "✗ Missing helm hook annotations on Job"
            exit 1
          fi
          if grep -q "before-hook-creation" /tmp/job-output.yaml; then
            echo "✓ before-hook-creation delete policy present"
          else
            echo "✗ Missing before-hook-creation delete policy"
            exit 1
          fi

      - name: Test job mode - install
        uses: Chia-Network/actions/helm/deploy@main
        with:
          namespace: "generic-job-mode"
          app_name: "generic-job-mode-test"
          helm_chart: "./charts/generic"
          helm_values: "./charts/generic/test-values-job.yaml"

      - name: Test job mode - verify Job ran after install
        run: |
          # Wait for the hook Job to complete
          set +e
          kubectl wait --for=condition=complete job/generic-job-mode-test \
            -n generic-job-mode --timeout=60s
          JOB_EXIT=$?
          set -e
          if [ $JOB_EXIT -eq 0 ]; then
            echo "✓ Job completed successfully after helm install"
          else
            echo "✗ Job did not complete within timeout"
            kubectl describe job generic-job-mode-test -n generic-job-mode
            exit 1
          fi
          # Verify no Deployment was created
          if kubectl get deployment generic-job-mode-test -n generic-job-mode 2>/dev/null; then
            echo "✗ Unexpected Deployment found (should only be a Job)"
            exit 1
          else
            echo "✓ No Deployment found (correct)"
          fi

      - name: Test job mode - upgrade re-runs the job
        uses: Chia-Network/actions/helm/deploy@main
        with:
          namespace: "generic-job-mode"
          app_name: "generic-job-mode-test"
          helm_chart: "./charts/generic"
          helm_values: "./charts/generic/test-values-job.yaml"

      - name: Test job mode - verify Job ran again after upgrade
        run: |
          set +e
          kubectl wait --for=condition=complete job/generic-job-mode-test \
            -n generic-job-mode --timeout=60s
          JOB_EXIT=$?
          set -e
          if [ $JOB_EXIT -eq 0 ]; then
            echo "✓ Job completed successfully after helm upgrade (old job was deleted and re-created)"
          else
            echo "✗ Job did not complete within timeout after upgrade"
            kubectl describe job generic-job-mode-test -n generic-job-mode
            exit 1
          fi

      - name: Test cronjob mode - verify template structure
        run: |
          helm template test ./charts/generic -f ./charts/generic/test-values-cronjob.yaml > /tmp/cronjob-output.yaml
          # Must produce a CronJob, not a Deployment or StatefulSet
          if grep -q "kind: CronJob" /tmp/cronjob-output.yaml; then
            echo "✓ CronJob resource found"
          else
            echo "✗ CronJob resource not found"
            exit 1
          fi
          if grep -q "kind: Deployment" /tmp/cronjob-output.yaml; then
            echo "✗ Unexpected Deployment found in cronjob mode output"
            exit 1
          else
            echo "✓ No Deployment in cronjob mode output (correct)"
          fi
          # Must not have Helm hook annotations (CronJob is a normal release resource)
          if grep -q "helm.sh/hook" /tmp/cronjob-output.yaml; then
            echo "✗ Unexpected Helm hook annotations on CronJob (should only be on Job mode)"
            exit 1
          else
            echo "✓ No Helm hook annotations on CronJob (correct)"
          fi
          # Verify schedule is rendered
          if grep -q 'schedule: "\*/5 \* \* \* \*"' /tmp/cronjob-output.yaml; then
            echo "✓ Schedule rendered correctly"
          else
            echo "✗ Schedule not found in CronJob output"
            exit 1
          fi

      - name: Test cronjob mode - install
        uses: Chia-Network/actions/helm/deploy@main
        with:
          namespace: "generic-cronjob-mode"
          app_name: "generic-cronjob-mode-test"
          helm_chart: "./charts/generic"
          helm_values: "./charts/generic/test-values-cronjob.yaml"

      - name: Test cronjob mode - verify CronJob created
        run: |
          kubectl get cronjob generic-cronjob-mode-test -n generic-cronjob-mode
          if [ $? -eq 0 ]; then
            echo "✓ CronJob 'generic-cronjob-mode-test' exists in namespace 'generic-cronjob-mode'"
          else
            echo "✗ CronJob not found"
            exit 1
          fi
          # Verify no Deployment was created
          if kubectl get deployment generic-cronjob-mode-test -n generic-cronjob-mode 2>/dev/null; then
            echo "✗ Unexpected Deployment found (should only be a CronJob)"
            exit 1
          else
            echo "✓ No Deployment found (correct)"
          fi

      - name: Test cronjob mode - missing schedule should fail
        run: |
          set +e
          helm template test ./charts/generic --set mode=cronjob 2>&1 | tee /tmp/cronjob-no-schedule.txt
          EXIT_CODE=${PIPESTATUS[0]}
          set -e
          if [ $EXIT_CODE -eq 0 ]; then
            echo "✗ Expected validation failure for cronjob without schedule, but helm template succeeded"
            exit 1
          fi
          if grep -q "job.schedule is required" /tmp/cronjob-no-schedule.txt; then
            echo "✓ Validation correctly failed with expected error message"
          else
            echo "✗ Validation failed but with unexpected error message"
            cat /tmp/cronjob-no-schedule.txt
            exit 1
          fi

      - name: Install generic-stateful chart
        uses: Chia-Network/actions/helm/deploy@main
        with:
          namespace: "generic-stateful"
          app_name: "generic-stateful-test"
          helm_chart: "./charts/generic-stateful"
          helm_values: "./charts/generic-stateful/values.yaml"

      - name: Install chia-blockchain chart
        uses: Chia-Network/actions/helm/deploy@main
        with:
          namespace: "chia-blockchain"
          app_name: "chia-blockchain"
          helm_chart: "./charts/chia-blockchain"
          helm_values: "./charts/chia-blockchain/values.yaml"
